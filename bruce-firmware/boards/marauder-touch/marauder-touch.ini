; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:Marauder-V4-V6]
board = esp32dev
board_build.partitions = custom_4Mb_full.csv
build_src_filter =${env.build_src_filter} +<../boards/marauder-touch>
build_flags =
	${env.build_flags}
	${env_4mb.build_flags}

	-Iboards/marauder-touch
	-DUSE_TFT_eSPI_TOUCH

	-D SDCARD_CS=12
	-D MARAUDER_TOUCH
	-D TFT_HEIGHT=320
	-D TFT_WIDTH=240
	-D TOUCH_XPT2046_SPI
	-D XPT2046_TOUCH_CONFIG_INT_GPIO_NUM=-1
	-D XPT2046_SPI_BUS_MISO_IO_NUM=19
	-D XPT2046_SPI_BUS_MOSI_IO_NUM=23
	-D XPT2046_SPI_BUS_SCLK_IO_NUM=18
	-D XPT2046_SPI_CONFIG_CS_GPIO_NUM=21

	-DDEVICE_NAME='"Marauder v4-v6"'

lib_deps =
	${env.lib_deps}

lib_ignore =
	${env_4mb.lib_ignore}

[env:Marauder-v61]
extends=env:Marauder-V4-V6
build_flags =
	${env:Marauder-V4-V6.build_flags}
	-D SDCARD_CS=14
build_unflags =
	-D SDCARD_CS=12

[env:LAUNCHER_Marauder-V4-V6]
extends=env:Marauder-V4-V6
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:Marauder-V4-V6.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}

[env:LAUNCHER_Marauder-v61]
extends=env:Marauder-v61
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:Marauder-v61.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}



[env:Awok-Touch]
extends = env:Marauder-v61
board_build.partitions = custom_16Mb.csv
board_upload.maximum_size = 16777216
board_upload.flash_size=16MB


[env:WaveSentry-R1]
extends=env:Marauder-V4-V6
build_flags =
	${env:Marauder-V4-V6.build_flags}
	-D WAVESENTRY=1
	-D ENCODER_INA=2
	-D ENCODER_INB=14
	-D ENCODER_KEY=0
	-D HAS_ENCODER=1
lib_deps =
	${env.lib_deps}
	mathertel/RotaryEncoder @1.5.3

[env:LAUNCHER_WaveSentry-R1]
extends = env:WaveSentry-R1
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:WaveSentry-R1.build_flags}
	${env_light.build_flags}

lib_deps =
	${env_light.lib_deps}
	mathertel/RotaryEncoder @1.5.3

