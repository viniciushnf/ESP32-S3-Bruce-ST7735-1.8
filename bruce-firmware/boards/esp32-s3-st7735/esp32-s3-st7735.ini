;   Developed by ViniciusHNF
;   GitHub Repository: https://github.com/viniciushnf/ESP32-S3-Bruce-ST7735-1.8

[env:esp32-s3-st7735]
board = esp32-s3-devkitc-1
board_build.partitions = custom_16Mb.csv

build_src_filter = ${env.build_src_filter} +<../boards/esp32-s3-st7735>

build_flags =
    ${env.build_flags}
    -Iboards/esp32-s3-st7735
    -DUSB_as_HID=1

    -Os

    -DCORE_DEBUG_LEVEL=1
    -DREDRAW_DELAY=1
    -DALLOW_ALL_GPIO_FOR_IR_RF=1
    -DDISABLE_ALL_LIBRARY_WARNINGS

    ; Board Identification
    -DESP32_S3_ST7735
    -DDEVICE_NAME='"esp32-s3-st7735"'

    ; ---------------------
    ;        I2C
    ; ---------------------
    -DGROVE_SDA=18
	-DGROVE_SCL=8

    ; ---------------------
    ;     IR LED PIN
    ; ---------------------
    ; -DIR_TX_PINS='{{"M5 IR Mod", GROVE_SDA}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}' ; Original
	; -DIR_RX_PINS='{{"M5 IR Mod", GROVE_SCL}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}' ; Original
    -DIR_TX_PINS='{{"Pin TX 1", 1}}'
	-DIR_RX_PINS='{{"Pin RX 2", 2}}'
	-DTXLED=48
	-DLED_ON=HIGH
	-DLED_OFF=LOW

    ; ---------------------
    ;    Radio Frequency
    ; ---------------------
    -DRF_TX_PINS='{{"M5 RF433T", GROVE_SDA}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}'
	-DRF_RX_PINS='{{"M5 RF433R", GROVE_SCL}, {"Grove W", GROVE_SCL}, {"Grove Y", GROVE_SDA}}'

    ; ---------------------
    ;       SD Card
    ; ---------------------
    -DSDCARD_CS=40
	-DSDCARD_SCK=5
	-DSDCARD_MISO=41
	-DSDCARD_MOSI=6

    ; ---------------------
    ;       Display
    ; ---------------------
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DST7735_GREENTAB3
    -DTFT_RGB_ORDER=TFT_BGR
    -DSMOOTH_FONT=1
    -DTFT_CS=16
	-DTFT_DC=7
	-DTFT_RST=15
	-DTFT_MOSI=6
	-DTFT_SCLK=5
    -DTFT_MISO=41 ; pin MISO SPI (The display doesn't use it, but it avoids errors.)
	-DTFT_BL=4
    -DTFT_BACKLIGHT_ON=HIGH
    -DFP=1 ; Text size
	-DFM=2 ; Text size
	-DFG=3 ; Text size
    -DTFT_SPI_PORT=FSPI

    -DHAS_SCREEN=1
    -DROTATION=1
    -DMINBRIGHT=1

    -DHAS_BTN=1
	-DBTN_ALIAS='"Mid"'
	-DBTN_PIN=0
	-DBTN_ACT=LOW

    ; ---------------------
    ;       CC1101
    ; ---------------------
    -DUSE_CC1101_VIA_SPI
	-DCC1101_GDO0_PIN=21
	-DCC1101_SS_PIN=47
	-DCC1101_MOSI_PIN=6
	-DCC1101_SCK_PIN=5
	-DCC1101_MISO_PIN=41
	;-DCC1101_GDO2_PIN=35  ; optional

    ; ---------------------
    ;       NRF24L01
    ; ---------------------
    -DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=21
	-DNRF24_SS_PIN=47 ; chip select
	-DNRF24_MOSI_PIN=6
	-DNRF24_SCK_PIN=5
	-DNRF24_MISO_PIN=41
    ; IRQ = 35            ; optional

    ; ---------------------
    ;           SPI
    ; ---------------------
    -DSPI_SCK_PIN=5
	-DSPI_MOSI_PIN=6
	-DSPI_MISO_PIN=41
	-DSPI_SS_PIN=11 ; Just so it's not empty.
    -DSPI_FREQUENCY=27000000 ; Original
    ; -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=16000000

    ; ---------------------
    ;      Joystick
    ; ---------------------
    -DJOY_X=12
    -DJOY_Y=13
    -DSEL_BTN=14
    ; -DSEL_BTN=12
    ; -DJOY_X=14
    ; -DJOY_Y=13

    ; ---------------------
    ;      Battery
    ; ---------------------
    -DBAT_PIN=10 ; Battery voltage divider on GPIO 10
    ; If you need to change the battery voltage divider pin, also change the GPIO in the file src/modules/others/battery_information.cpp

lib_deps = ${env.lib_deps}
